<!DOCTYPE html>
<html lang="bg">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SipJoy - Детайли за продукта</title>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
        <link rel="stylesheet" href="../assets/css/styles.css">
    </head>

    <body class="bg-dark text-white">

        <div class="container mt-4">
            <a href="products.html" class="back-btn">
                <i class="bi bi-arrow-left me-2"></i>Назад към продуктите
            </a>
        </div>

        <section class="product-details-section">
            <div class="container">
                <div class="row align-items-center g-5">
                    <div class="col-lg-6 text-center">
                        <div class="img-zoom-container" id="zoomTrigger">
                            <img id="product-img" src="" alt="" class="img-fluid">
                        </div>
                        <p class="text-muted mt-3 small"><i class="bi bi-search me-1"></i> Кликни върху снимката за увеличение</p>
                    </div>

                    <div class="col-lg-6">
                        <h1 id="product-title" class="display-4 fw-bold mb-3" style="color: var(--accent);"></h1>
                        
                        <div class="mb-4">
                            <h5 class="fw-bold"><i class="bi bi-info-circle me-2 text-accent"></i>Състав:</h5>
                            <p id="product-ingredients" class="lead fs-6"></p>
                        </div>

                        <div id="product-tags" class="mb-4"></div>

                        <div class="nutrition-card p-4">
                            <h5 class="fw-bold mb-3">Хранителна стойност (на 100ml):</h5>
                            <table class="table table-dark m-0">
                                <tbody id="nutrition-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../assets/js/scripts.js"></script>
    </body>
</html>
