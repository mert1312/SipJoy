    <body>
        
        <nav class="navbar navbar-expand-lg px-3">
            <div class="container">
                <a class="navbar-brand" href="../index.html">
                    <img src="../assets/media/img/logo.png" alt="SipJoy">

                <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                    <i class="bi bi-list text-dark"></i>

                <div class="collapse navbar-collapse" id="nav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a href="../index.html" class="nav-link">Начало</a></li>

        <section class="container text-center my-5">

        <section class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">

                    <div class="section-box">

                        <h2 class="mb-4"><i class="bi bi-envelope me-2"></i>Форма за контакт</h2>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">Име</label>
                                <input type="text" class="form-control" placeholder="Вашето име" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Имейл</label>
                                <input type="email" class="form-control" placeholder="example@email.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Съобщение</label>
                                <textarea class="form-control" rows="4"></textarea>
                            </div>

                            <button class="btn btn-custom w-100">Изпрати</button>
                        </form>

                    </div>

                </div>
            </div>
        </section>

        <section class="container mt-5 text-center">
            <p><i class="bi bi-envelope"></i> s236267@stud.uni-ruse.bg</p>

        <footer class="text-center mt-5 p-4">
